name: Build Tunnel EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install wintun-py scapy colorama pyinstaller
      - name: Build
        run: pyinstaller --onefile --uac-admin --add-binary "wintun.dll;." tunnel.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-tunnel-exe
          path: dist/tunnel.exe
